name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Allow auto-merge.yml to react to this workflow's completion.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt ruff
          python -m pip check

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile
        run: python -m compileall -q inmermusic tests

      - name: Run tests
        run: pytest tests/ -q
