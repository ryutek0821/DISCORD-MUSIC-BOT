name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Allow auto-merge.yml to react to this workflow's completion.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: python tests/test_features.py
