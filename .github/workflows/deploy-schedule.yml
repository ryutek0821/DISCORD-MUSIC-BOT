name: Scheduled Deploy at 18:00 JST

on:
  schedule:
    # JST 18:00 = UTC 9:00
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: false
        default: 'Manual deployment'

jobs:
  check-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check if master was updated today
        id: check
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1,
              sha: 'master'
            });
            
            if (commits.length === 0) {
              return 'no-commits';
            }
            
            const lastCommit = commits[0];
            const commitDate = new Date(lastCommit.commit.author.date);
            const now = new Date();
            const jstNow = new Date(now.getTime() + (9 * 60 * 60 * 1000));
            
            // Check if commit was today JST
            const isToday = commitDate.toDateString() === jstNow.toDateString();
            console.log(`Last commit: ${commitDate}, Today: ${jstNow}, Is today: ${isToday}`);
            
            return isToday ? 'deploy' : 'skip';

      - name: Connect to Tailscale
        if: steps.check.outputs.result == 'deploy'
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey "$TAILSCALE_AUTHKEY" --accept-routes --hostname github-actions-deploy

      - name: Deploy to Raspberry Pi
        if: steps.check.outputs.result == 'deploy'
        env:
          SSH_HOST: 100.114.153.17
          SSH_USER: ryu
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          # Install SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Disable host key checking
          echo "Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null" >> ~/.ssh/config
          
          # Deploy via SSH (Tailscale IP - no port forwarding needed)
          ssh "$SSH_USER@$SSH_HOST" << 'EOF'
            cd ~/niconico-discord-bot
            git fetch origin
            git checkout master
            git pull origin master
            echo "Deployed successfully at $(date)"
          EOF