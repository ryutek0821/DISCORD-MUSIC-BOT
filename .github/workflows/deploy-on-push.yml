name: Auto Deploy on Push to Master

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey "$TAILSCALE_AUTHKEY" --accept-routes --hostname github-actions-deploy

      - name: Deploy to RYU-RASPBERRYPI
        env:
          SSH_HOST: 100.114.153.17
          SSH_USER: ryu
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          # Install SSH key (runner -> RYU-SERVER)
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Disable host key checking
          printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' >> ~/.ssh/config

          # Sync the checked-out repo to the server. The server does not need
          # GitHub access; files are pushed directly over SSH (Tailscale IP).
          # Server-specific runtime files are preserved via --exclude.
          rsync -az --delete \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='.env' \
            --exclude='cookies.txt' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.log' \
            ./ "$SSH_USER@$SSH_HOST:~/niconico-discord-bot/"

          # Install deps and restart the service on the server.
          ssh "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            cd ~/niconico-discord-bot
            ./venv/bin/pip install -q -r requirements.txt
            sudo systemctl restart niconico-bot
            sleep 5
            systemctl is-active niconico-bot
            echo "Deployed and restarted at $(date)"
          EOF
