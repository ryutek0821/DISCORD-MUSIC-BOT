name: Auto Deploy on Push to Master

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey "$TAILSCALE_AUTHKEY" --accept-routes --hostname github-actions-deploy --ephemeral

      - name: Deploy to Raspberry Pi
        env:
          SSH_HOST: 100.114.153.17
          SSH_USER: ryu
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          # Install SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Disable host key checking
          echo "Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null" >> ~/.ssh/config
          
          # Deploy via SSH (Tailscale IP - no port forwarding needed)
          ssh "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            cd ~/niconico-discord-bot
            git fetch origin
            git checkout master
            git pull origin master

            # Install/upgrade dependencies (use venv if present)
            if [ -x venv/bin/pip ]; then
              PIP="venv/bin/pip"
            else
              PIP="python3 -m pip"
            fi
            echo "Installing dependencies with: $PIP"
            $PIP install --upgrade -r requirements.txt

            # Restart the bot so new code and dependencies take effect
            if systemctl list-unit-files | grep -q '^niconico-bot\.service'; then
              sudo systemctl restart niconico-bot
              sudo systemctl --no-pager status niconico-bot | head -n 5 || true
            else
              echo "WARNING: niconico-bot.service not found; restart the bot manually"
            fi

            echo "Deployed successfully at $(date)"
          EOF
