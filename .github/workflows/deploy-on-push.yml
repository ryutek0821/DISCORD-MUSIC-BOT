name: Auto Deploy on Push to Master

concurrency:
  group: deploy-master
  cancel-in-progress: false

on:
  # Deploy only after the CI workflow for the master push has passed.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # workflow_run must deploy exactly the commit CI validated.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Connect to Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey "$TAILSCALE_AUTHKEY" --accept-routes --hostname github-actions-deploy

      - name: Deploy to RYU-RASPBERRYPI
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ryu
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          test -n "$SSH_HOST" -a -n "$SSH_KEY" -a -n "$SSH_KNOWN_HOSTS"

          # Install SSH key and a pinned host key (never disable verification).
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

          # Sync the checked-out repo to the server. The server does not need
          # GitHub access; files are pushed directly over SSH (Tailscale IP).
          # Server-specific runtime files are preserved via --exclude.
          rsync -az --delete \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='.env' \
            --exclude='cookies.txt' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.log' \
            ./ "$SSH_USER@$SSH_HOST:~/niconico-discord-bot/"

          # Install deps and restart the service on the server.
          ssh "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            cd ~/niconico-discord-bot
            ./venv/bin/pip install --disable-pip-version-check -q -r requirements.txt
            sudo systemctl restart niconico-bot
            sleep 5
            systemctl is-active niconico-bot
            echo "Deployed and restarted at $(date)"
          EOF
